server {
    # Bloque principal ('server block') de configuración de NGINX para un host virtual.

    # ------------------------------------------------------------------------------
    # PROTOCOLOS Y PUERTOS
    # ------------------------------------------------------------------------------
    # Escucha solo en el puerto 443 usando el protocolo SSL/TLS.
    listen      443 ssl;
    
    # También escucha en el puerto 443 para conexiones del protocolo IPv6.
    listen  [::]:443 ssl;
    
    # ------------------------------------------------------------------------------
    # IDENTIFICACIÓN Y UBICACIÓN
    # ------------------------------------------------------------------------------
    # server_name define qué nombre de dominio activará este bloque de servidor.
    # Debe coincidir con la URL que utilizaremos en el navegador (evaluada por Inception).
    server_name login42.42.fr;

    # root define el directorio raíz donde NGINX buscará los archivos para servir.
    # Apunta al volumen de WordPress (/var/www/wordpress) montado en el docker-compose.
    root    /var/www/wordpress;
    
    # index define, en orden, los archivos que buscará por defecto al acceder a un directorio.
    # Le damos prioridad a index.php por ser un sitio WordPress (PHP).
    index index.php index.html index.htm;

    # ------------------------------------------------------------------------------
    # CONFIGURACIÓN DE SSL (Certificados y Protocolos)
    # ------------------------------------------------------------------------------
    # ssl_certificate apunta a la clave pública (certificado).
    ssl_certificate     /etc/nginx/ssl/login42.crt;
    
    # ssl_certificate_key apunta a la clave privada (secreta y que no debe publicarse).
    ssl_certificate_key /etc/nginx/ssl/login42.key;
    
    # ssl_protocols restringe las conexiones a protocolos modernos y seguros.
    # Requisito Mandatory vital: Inception solo permite TLSv1.2 y TLSv1.3 (nada anterior).
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ------------------------------------------------------------------------------
    # GESTIÓN DE RUTAS (Locations)
    # ------------------------------------------------------------------------------
    
    # Gestiona qué ocurre en la ruta principal ('/').
    location / {
        # try_files intenta servir el archivo solicitado ($uri), 
        # si no existe, busca un directorio ($uri/), 
        # y si tampoco, delega internamente a index.php pasándole los argumentos ($args).
        # Esto es imprescindible para los 'permalinks' o enlaces permanentes de WordPress.
        try_files $uri $uri/ /index.php?$args;
    }

    # Bloque de expresión regular (~ \.php$) que atrapa cualquier petición finalizada en .php
    location ~ \.php$ {
        # Divide la URL recibida para extraer el nombre del archivo script (.php)
        # y cualquier posible ruta de información adicional extra.
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Delega la ejecución de PHP a nuestro contenedor llamado 'wordpress'
        # y se comunica a través de su puerto expuesto 9000 mediante el protocolo FastCGI.
        fastcgi_pass wordpress:9000;
        
        # Especifica qué script buscar por defecto si FastCGI recibe una ruta de directorio.
        fastcgi_index index.php;
        
        # Incluye variables comunes de FastCGI nativas de NGINX.
        include fastcgi_params;
        
        # Parámetro crítico: le dice a PHP-FPM dónde encontrar el archivo exacto a ejecutar.
        # Lo hace fusionando la ruta base ($document_root) con el nombre script ($fastcgi_script_name).
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Le pasa variables de ruta adicionales al intérprete PHP si las hubiere.
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}